<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║         PANTALLA DE LOGIN — GESTIÓN DE EQUIPOS       ║
  ║                                                      ║
  ║  Esta es la primera pantalla que ve el usuario.      ║
  ║  Su único trabajo es pedir email y contraseña        ║
  ║  y verificar que sean correctos.                     ║
  ╚══════════════════════════════════════════════════════╝
-->
<html lang="es">
<head>
<meta charset="UTF-8">
  <!--
  viewport: le dice al navegador que ajuste el tamaño
  de la página al ancho del dispositivo.
-->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Equipos — Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- global.css aporta variables de color, fuente y reset basico -->
<link rel="stylesheet" href="css/global.css">
<style>
  /* El login centra su contenido verticalmente y horizontalmente */
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: var(--blanco);
    border-radius: 12px;
    padding: 48px 44px;
    width: 100%;
    max-width: 400px;
    border: 1px solid var(--borde);
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sistema-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--secundario);
    margin-bottom: 10px;
    display: block;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--principal);
    margin-bottom: 6px;
  }

  .subtitulo {
    font-size: 13px;
    color: var(--texto-suave);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .divisor {
    height: 1px;
    background: var(--borde);
    margin-bottom: 28px;
  }

  .campo { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--texto);
    margin-bottom: 7px;
  }

  .input-wrap { position: relative; }

  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 11px 14px 11px 40px;                /* arriba | derecha | abajo | izquierda */
    border: 1.5px solid var(--borde);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--texto);
    background: var(--blanco);
    transition: border-color 0.2s;
    outline: none;
  }

  input::placeholder { color: #C0CBCA; }
  input:focus { border-color: var(--secundario); } /* borde verde al hacer clic */

  .input-icon {
    position: absolute;                            /*posiciona dentro del input-wrap*/
    left: 13px;
    top: 50%;
    transform: translateY(-50%);                    /* centrado vertical perfecto */
    width: 16px;
    height: 16px;
    stroke: var(--claro);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;                            /* no interfiere con clics    */
    transition: stroke 0.2s;
  }

  .input-wrap:focus-within .input-icon { stroke: var(--secundario); }

  .toggle-pass {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px;
    display: flex;
  }

  .toggle-pass svg {
    width: 16px;
    height: 16px;
    stroke: var(--claro);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s;
  }

  .toggle-pass:hover svg { stroke: var(--secundario); } /* verde al pasar el mouse */ 

  .opciones {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .recordar {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--texto-suave);
    cursor: pointer;
    user-select: none;
  }

  .recordar input[type="checkbox"] {
    width: 14px;
    height: 14px;
    padding: 0;
    accent-color: var(--principal);
    cursor: pointer;
  }

  .olvidaste {
    font-size: 13px;
    color: var(--secundario);
    text-decoration: none;
    font-weight: 500;
  }

  .olvidaste:hover { text-decoration: underline; }

  .btn-login {
    width: 100%;
    padding: 12px;
    background: var(--principal);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-login:hover { background: var(--secundario); }    /* Color cambia a verde secundario al pasar el mouse */
  .btn-login:active { transform: scale(0.99); }
  .btn-login:disabled { opacity: 0.7; cursor: not-allowed; } /* cursor de "no disponible" durante la carga*/
  }

  .error-msg {
    display: none;
    background: #FFF5F5;
    border: 1px solid #FED7D7;
    border-radius: 7px;
    padding: 9px 13px;
    font-size: 13px;
    color: var(--error);
    margin-bottom: 18px;
    align-items: center;
    gap: 7px;
  }

  .error-msg.visible { display: flex; }

  .footer-card {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--borde);
    text-align: center;
    font-size: 12px;
    color: var(--claro);
  }
</style>
</head>
<body>
<div class="card">

  <span class="sistema-label">Sistema de Gestión</span>
  <h1>Gestión de Equipos</h1>
  <p class="subtitulo">Ingresa tus credenciales para continuar.</p>

  <div class="divisor"></div>

  <div class="error-msg" id="error-msg">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="error-text">Correo o contraseña incorrectos.</span>
  </div>

  <form id="login-form" novalidate>

    <div class="campo">
      <label for="email">Correo electrónico</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" required/>
      </div>
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
        <button type="button" class="toggle-pass" id="toggle-pass">
          <svg id="eye-icon" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="opciones">
      <label class="recordar">
        <input type="checkbox" id="recordar">
        Recordarme
      </label>
      <a href="#" class="olvidaste">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="submit" class="btn-login" id="btn-login">
      Iniciar sesión
    </button>

  </form>

  <div class="footer-card">

  </div>

</div>

<script>
  const togglePass = document.getElementById('toggle-pass');
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eye-icon');
 // Cuando se hace clic en el botón ojo...
  togglePass.addEventListener('click', () => {
    // ¿El input está en modo contraseña (oculto)?
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
     // Cambiamos el ícono del ojo según el estado
    eyeIcon.innerHTML = isPassword
      //contraseña visible
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      //contraseña oculta
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  const form = document.getElementById('login-form');
  const btnLogin = document.getElementById('btn-login');
  const errorMsg = document.getElementById('error-msg');
  const errorText = document.getElementById('error-text');
// Cuando el usuario hace clic en "Iniciar sesión"...
  form.addEventListener('submit', (e) => {
    // e.preventDefault() evita que la página se recargue
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    errorMsg.classList.remove('visible');

    if (!email || !password) {
      errorText.textContent = 'Por favor completa todos los campos.';
      errorMsg.classList.add('visible');
      return;
    }

    btnLogin.textContent = 'Verificando...';
    btnLogin.disabled = true;

    setTimeout(() => {
      btnLogin.textContent = 'Iniciar sesión';
      btnLogin.disabled = false;
      // Mostramos error de credenciales incorrectas
      errorText.textContent = 'Correo o contraseña incorrectos.';
      errorMsg.classList.add('visible');
    }, 1500);
  });
</script>
</body>
</html>
